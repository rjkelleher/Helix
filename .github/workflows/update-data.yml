name: Update HELIX data

# Twice daily at 6:00 AM and 6:00 PM America/New_York (DST-proof), plus a manual button.
# GitHub cron is UTC-only, so we fire candidate times for both EST and EDT and let a
# guard step allow only the run that is actually 06:00 or 18:00 in New York.
on:
  schedule:
    - cron: "0 10 * * 1-5"   # 06:00 EDT (summer)
    - cron: "0 11 * * 1-5"   # 06:00 EST (winter)
    - cron: "0 22 * * 1-5"   # 18:00 EDT (summer)
    - cron: "0 23 * * 1-5"   # 18:00 EST (winter)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: helix-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Gate to 6 AM / 6 PM Eastern
        id: gate
        run: |
          H=$(TZ=America/New_York date +%H)
          if [ "$H" = "06" ] || [ "$H" = "18" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=yes" >> "$GITHUB_OUTPUT"
            echo "Proceeding (New York hour: $H)."
          else
            echo "run=no" >> "$GITHUB_OUTPUT"
            echo "Skipping — New York hour is $H, not 06 or 18."
          fi

      - name: Check out the repo
        if: steps.gate.outputs.run == 'yes'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.gate.outputs.run == 'yes'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.gate.outputs.run == 'yes'
        run: pip install -r requirements.txt

      - name: Build data.json
        if: steps.gate.outputs.run == 'yes'
        run: python build_dashboard_data.py

      - name: Commit data.json if it changed
        if: steps.gate.outputs.run == 'yes'
        run: |
          git config user.name  "helix-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No data change — nothing to commit."
          else
            git commit -m "data: refresh $(TZ=America/New_York date +'%Y-%m-%d %H:%M %Z')"
            git push
          fi

name: Update HELIX data
on:
  schedule:
    - cron: "0 22 * * 1-5"
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: helix-data
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build data.json
        run: python build_dashboard_data.py
      - name: Commit data.json if it changed
        run: |
          git config user.name "helix-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No data change"
          else
            git commit -m "data refresh"
            git push
          fi
